name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work?
      placeholder: Describe your ideal experience...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other ways you've thought about solving this?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Chat
        - Notes
        - Documents
        - Deep Research
        - Email
        - Image Generation
        - Memory
        - Settings
        - UI/UX
        - Performance
        - Other
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, or references from other apps.
    validations:
      required: false
